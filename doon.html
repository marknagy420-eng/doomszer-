<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HELLBYTE</title>
<style>
  :root {
    color-scheme: dark;
    --ui-bg: rgba(8, 9, 14, 0.55);
    --ui-bg-strong: rgba(8, 9, 14, 0.78);
    --ui-border: rgba(255, 255, 255, 0.22);
    --accent: #f74a72;
    --accent-2: #36ffd0;
    --minimap-x: 16px;
    --minimap-y: 16px;
    --minimap-size: 260px;
    --minimap-gap: 10px;
  }

  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; font-family: Inter, Segoe UI, Arial, sans-serif; }
  canvas { display: block; width: 100vw; height: 100vh; }

  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 20; }

  .game-title {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    color: #000;
    font-size: clamp(24px, 3.2vw, 44px);
    font-weight: 900;
    letter-spacing: 2px;
    text-shadow:
      0 1px 0 rgba(255,255,255,.5),
      0 2px 4px rgba(0,0,0,.55),
      0 0 12px rgba(0,0,0,.35);
    z-index: 21;
    animation: titlePulse 2.8s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% {
      opacity: .82;
      filter: drop-shadow(0 0 0 rgba(0,0,0,0));
    }
    50% {
      opacity: 1;
      filter: drop-shadow(0 0 6px rgba(0,0,0,.42));
    }
  }

  .ammo-panel {
    position: fixed;
    left: var(--minimap-x);
    top: calc(var(--minimap-y) + var(--minimap-size) + var(--minimap-gap));
    width: var(--minimap-size);
    padding: 0;
    border: 0;
    border-radius: 0;
    background: transparent;
    backdrop-filter: none;
    box-shadow: none;
    z-index: 21;
    pointer-events: none;
  }

  .ammo-head { display: flex; justify-content: space-between; color: #d8dfeb; font-size: 13px; margin-bottom: 6px; }
  #ammoText { font-weight: 700; color: #fff; font-size: 18px; }
  .ammo-load { height: 14px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,0.2); border: 0; }
  #ammoFill { height: 100%; width: 100%; background: linear-gradient(90deg, #48ff9f, #17c9ff); transition: width .15s linear; }

  .overlay { position: fixed; inset: 0; z-index: 30; display: none; align-items: center; justify-content: center; }
  .overlay.visible { display: flex; }

  #mainMenu {
    background: linear-gradient(rgba(5,5,8,.56), rgba(5,5,8,.8)), url("menuback.png") center/cover no-repeat;
  }

  .menu-shell {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px;
    background: linear-gradient(180deg, rgba(8,8,12,0), rgba(8,8,12,.48));
    border-top: 1px solid rgba(255,255,255,.1);
    backdrop-filter: blur(4px);
  }

  .menu-btn {
    border: 1px solid rgba(255,255,255,.24);
    background: rgba(255,255,255,.1);
    color: #fff;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 15px;
    cursor: pointer;
    transition: .18s ease;
  }

  .menu-btn:hover, .menu-btn.active {
    border-color: var(--accent-2);
    box-shadow: 0 0 0 1px rgba(54,255,208,.34) inset;
    transform: translateY(-1px);
  }

  .popup {
    width: min(680px, 94vw);
    min-height: 220px;
    padding: 18px;
    border-radius: 14px;
    border: 1px solid var(--ui-border);
    background: var(--ui-bg);
    backdrop-filter: blur(8px);
    box-shadow: 0 24px 60px rgba(0,0,0,.55);
    color: #f0f4ff;
  }

  .popup h2 { margin: 0 0 12px; }
  .popup-head { display: flex; justify-content: space-between; align-items: center; }

  .field { margin-bottom: 14px; display: grid; gap: 8px; }
  label { font-weight: 600; color: #dce3ee; }
  select {
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,.22);
    background: rgba(255,255,255,.1);
    color: #fff;
    padding: 9px 11px;
    font-size: 14px;
  }

  .stat { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.09); }

  #pauseMenu .popup { width: min(440px, 88vw); min-height: auto; }

  #fade {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    z-index: 60;
    transition: opacity .34s ease;
  }

  #bigMap {
    position: fixed;
    inset: 6vh 6vw;
    z-index: 40;
    border: 1px solid rgba(255,255,255,.28);
    border-radius: 14px;
    overflow: hidden;
    background: rgba(0,0,0,.7);
    display: none;
  }

  #bigMap.visible { display: block; }
  #bigMap canvas { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" aria-hidden="true">
  <div class="ammo-panel" id="ammoPanel">
    <div class="ammo-head">
      <span id="ammoLabel">Lőszer</span>
      <span id="ammoText">20 / 100</span>
    </div>
    <div class="ammo-load"><div id="ammoFill"></div></div>
  </div>
</div>

<div id="mainMenu" class="overlay visible">
  <div class="game-title" id="menuTitle">HELLBYTE</div>
  <div class="menu-shell">
    <button class="menu-btn" id="newGameBtn">Új játék</button>
    <button class="menu-btn" id="continueBtn">Folytatás</button>
    <button class="menu-btn" id="settingsBtn">Beállítások</button>
    <button class="menu-btn" id="storeBtn">Store</button>
    <button class="menu-btn" id="scoreboardBtn">Scoreboard</button>
  </div>

  <div id="settingsPopup" class="popup" style="display:none">
    <div class="popup-head">
      <h2 id="settingsTitle">Beállítások</h2>
      <button class="menu-btn" data-close="settings">✕</button>
    </div>
    <div class="field">
      <label for="soundToggle" id="soundLabel">Hang</label>
      <select id="soundToggle">
        <option value="on">Bekapcsolva</option>
        <option value="off">Kikapcsolva</option>
      </select>
    </div>
    <div class="field">
      <label for="languageSelect" id="languageLabel">Nyelv</label>
      <select id="languageSelect">
        <option value="hu">Magyar</option>
        <option value="en">English</option>
        <option value="de">Deutsch</option>
        <option value="uk">Українська</option>
        <option value="zh">中文</option>
      </select>
    </div>
    <div class="field">
      <label for="difficultySelect" id="difficultyLabel">Nehézség</label>
      <select id="difficultySelect">
        <option value="easy">Easy</option>
        <option value="normal" selected>Normal</option>
        <option value="hard">Hard</option>
      </select>
    </div>
  </div>

  <div id="storePopup" class="popup" style="display:none">
    <div class="popup-head">
      <h2 id="storeTitle">Store</h2>
      <button class="menu-btn" data-close="store">✕</button>
    </div>
    <p id="storeBody">Hamarosan.</p>
  </div>

  <div id="scorePopup" class="popup" style="display:none">
    <div class="popup-head">
      <h2 id="scoreTitle">Scoreboard</h2>
      <button class="menu-btn" data-close="score">✕</button>
    </div>
    <div class="stat"><span id="lastScoreLabel">Legutóbbi pontszám</span><strong id="lastScore">0</strong></div>
    <div class="stat"><span id="totalShotsLabel">Összes lövés</span><strong id="totalShots">0</strong></div>
  </div>
</div>

<div id="pauseMenu" class="overlay">
  <div class="popup">
    <h2 id="pauseTitle">Szünet</h2>
    <p id="pauseHint">ESC: vissza a játékba</p>
    <button class="menu-btn" id="resumeBtn">Folytatás</button>
    <button class="menu-btn" id="restartBtn">Újra</button>
    <button class="menu-btn" id="toMenuBtn">Menü</button>
    <button class="menu-btn" id="exitBtn">Kilépés</button>
  </div>
</div>

<div id="bigMap"><canvas id="bigMapCanvas"></canvas></div>
<div id="fade"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const bigMapCanvas = document.getElementById("bigMapCanvas");
const bigMapCtx = bigMapCanvas.getContext("2d");

const hud = document.getElementById("hud");
const mainMenu = document.getElementById("mainMenu");
const pauseMenu = document.getElementById("pauseMenu");
const ammoText = document.getElementById("ammoText");
const ammoFill = document.getElementById("ammoFill");
const fade = document.getElementById("fade");
const bigMap = document.getElementById("bigMap");
const lastScoreEl = document.getElementById("lastScore");
const totalShotsEl = document.getElementById("totalShots");

const STORAGE_KEY = "doomszer-save-v3";
const MOVE_KEYS = ["w", "a", "s", "d"];

const i18n = {
  hu: { newGame:"Új játék",cont:"Folytatás",settings:"Beállítások",store:"Store",score:"Scoreboard", pause:"Szünet", pauseHint:"ESC: vissza a játékba", resume:"Folytatás", restart:"Újra", menu:"Menü", exit:"Kilépés", sound:"Hang", lang:"Nyelv", diff:"Nehézség", ammo:"Lőszer", soon:"Hamarosan.", last:"Legutóbbi pontszám", shots:"Összes lövés" },
  en: { newGame:"New Game",cont:"Continue",settings:"Settings",store:"Store",score:"Scoreboard", pause:"Pause", pauseHint:"ESC: back to game", resume:"Resume", restart:"Restart", menu:"Menu", exit:"Exit", sound:"Sound", lang:"Language", diff:"Difficulty", ammo:"Ammo", soon:"Coming soon.", last:"Last score", shots:"Total shots" },
  de: { newGame:"Neues Spiel",cont:"Fortsetzen",settings:"Einstellungen",store:"Store",score:"Bestenliste", pause:"Pause", pauseHint:"ESC: zurück ins Spiel", resume:"Fortsetzen", restart:"Neustart", menu:"Menü", exit:"Beenden", sound:"Sound", lang:"Sprache", diff:"Schwierigkeit", ammo:"Munition", soon:"Kommt bald.", last:"Letzter Punktestand", shots:"Gesamtschüsse" },
  uk: { newGame:"Нова гра",cont:"Продовжити",settings:"Налаштування",store:"Магазин",score:"Таблиця", pause:"Пауза", pauseHint:"ESC: назад у гру", resume:"Продовжити", restart:"Перезапуск", menu:"Меню", exit:"Вихід", sound:"Звук", lang:"Мова", diff:"Складність", ammo:"Набої", soon:"Скоро.", last:"Останній рахунок", shots:"Усього пострілів" },
  zh: { newGame:"新游戏",cont:"继续",settings:"设置",store:"商店",score:"排行榜", pause:"暂停", pauseHint:"ESC 返回游戏", resume:"继续", restart:"重新开始", menu:"菜单", exit:"退出", sound:"声音", lang:"语言", diff:"难度", ammo:"弹药", soon:"即将上线。", last:"上次得分", shots:"总射击" }
};

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  bigMapCanvas.width = Math.floor(window.innerWidth * 0.88);
  bigMapCanvas.height = Math.floor(window.innerHeight * 0.88);
  syncHudLayout();
}
window.addEventListener("resize", resize);
resize();

const TILE_SIZE = 128;
const WALL_HEIGHT = 192;
const PLAYER_RADIUS = 20;
const PLAYER_HEIGHT = 64;
const HUD_MINIMAP_MARGIN = 16;
const HUD_MINIMAP_GAP = 10;
const HUD_MINIMAP_MIN_SIZE = 96;
const HUD_MINIMAP_MAX_SIZE = 340;
const HUD_AMMO_ESTIMATED_HEIGHT = 54;

const MAP = [
  "111111111111111111111111",
  "100000000000000000000001",
  "101111011111111011111101",
  "100001010000001010000001",
  "111101010111101010111101",
  "100001010100001010100001",
  "101111010101111010101101",
  "100000010100001000100001",
  "101111110101101111101101",
  "100000000100100000001001",
  "101111110100111111101101",
  "100000010000001000001001",
  "101101011111101011101101",
  "100101000000001000100001",
  "101101111111111110101101",
  "100000000000000000000001",
  "111111111111111111111111"
].map(r => r.split("").map(Number));

const worldWidth = MAP[0].length * TILE_SIZE;
const worldHeight = MAP.length * TILE_SIZE;

const player = { x:TILE_SIZE*1.6, y:TILE_SIZE*1.6, angle:0, pitch:0, z:0, velocityZ:0, isGrounded:true, crouchLocked:false, eyeHeight:PLAYER_HEIGHT };

const game = {
  state:"menu", score:0, totalShots:0,
  settings:{ sound:"on", language:"hu", difficulty:"normal" },
  mapOpen:false,
  autoFire:false,
  time:0,
  tracers:[]
};

const keys = Object.create(null);

const weapon = {
  recoil:0, muzzleFlash:0,
  clipSize:20, ammoInClip:20, reserveAmmo:100,
  reloading:false, reloadTimer:0, reloadTime:1.15,
  fireCooldown:0, autoRate:0.09, semiRate:0.24
};

const floorTexture = new Image();
const wallTexture = new Image();
const gunTexture = new Image();
const mapTexture = new Image();
floorTexture.src = "wood.png";
wallTexture.src = "wall.png";
gunTexture.src = "gun.png";
mapTexture.src = "map.png";

const audio = {
  menuMusic: new Audio("soundtrack.mp3"),
  walkLoop: new Audio("walk.mp3"),
  shotTemplate: new Audio("shot.mp3"),
  reload: new Audio("reload.mp3"),
  buttonTemplate: new Audio("button.mp3")
};
audio.menuMusic.loop = true;
audio.menuMusic.volume = 0.45;
audio.walkLoop.loop = true;
audio.walkLoop.volume = 0.4;
audio.reload.volume = 0.7;
audio.shotTemplate.volume = 0.75;
audio.buttonTemplate.volume = 0.65;
audio.shotTemplate.preload = "auto";
audio.buttonTemplate.preload = "auto";
audio.reload.addEventListener("loadedmetadata", () => {
  if (Number.isFinite(audio.reload.duration) && audio.reload.duration > 0) {
    weapon.reloadTime = audio.reload.duration;
  }
});

function isSoundOn() { return game.settings.sound !== "off"; }
function tryPlay(aud, fromStart = false) {
  if (!isSoundOn()) return;
  try {
    if (fromStart) aud.currentTime = 0;
    const p = aud.play();
    if (p && typeof p.catch === "function") p.catch(() => {});
  } catch {}
}
function tryPause(aud) {
  try { aud.pause(); } catch {}
}
function playOneShotFrom(template) {
  if (!isSoundOn()) return;
  try {
    const fx = template.cloneNode();
    fx.volume = template.volume;
    fx.play().catch(() => {});
  } catch {}
}
function updateMenuMusicState() {
  if (isSoundOn()) tryPlay(audio.menuMusic);
  else tryPause(audio.menuMusic);
}
function activateSoundtrack() {
  if (!isSoundOn()) return;
  tryPlay(audio.menuMusic);
}

function updateWalkSound() {
  const walking = game.state === "playing" && MOVE_KEYS.some(k => keys[k]);
  if (!walking || !isSoundOn()) {
    tryPause(audio.walkLoop);
    return;
  }
  tryPlay(audio.walkLoop);
}
function playButtonSound() { playOneShotFrom(audio.buttonTemplate); }

let floorPixels = null, floorTexW = 0, floorTexH = 0, floorPattern = null;
floorTexture.onload = () => {
  floorTexW = floorTexture.naturalWidth || floorTexture.width;
  floorTexH = floorTexture.naturalHeight || floorTexture.height;
  try {
    const tmp = document.createElement("canvas");
    tmp.width = floorTexW; tmp.height = floorTexH;
    const tctx = tmp.getContext("2d");
    tctx.drawImage(floorTexture, 0, 0);
    floorPixels = tctx.getImageData(0, 0, floorTexW, floorTexH).data;
  } catch {
    floorPixels = null;
  }
  try { floorPattern = ctx.createPattern(floorTexture, "repeat"); }
  catch { floorPattern = null; }
};

function t(k){ return (i18n[game.settings.language] || i18n.hu)[k] || k; }
function applyLanguage() {
  document.getElementById("newGameBtn").textContent = t("newGame");
  document.getElementById("continueBtn").textContent = t("cont");
  document.getElementById("settingsBtn").textContent = t("settings");
  document.getElementById("storeBtn").textContent = t("store");
  document.getElementById("scoreboardBtn").textContent = t("score");
  document.getElementById("settingsTitle").textContent = t("settings");
  document.getElementById("storeTitle").textContent = t("store");
  document.getElementById("scoreTitle").textContent = t("score");
  document.getElementById("pauseTitle").textContent = t("pause");
  document.getElementById("pauseHint").textContent = t("pauseHint");
  document.getElementById("resumeBtn").textContent = t("resume");
  document.getElementById("restartBtn").textContent = t("restart");
  document.getElementById("toMenuBtn").textContent = t("menu");
  document.getElementById("exitBtn").textContent = t("exit");
  document.getElementById("soundLabel").textContent = t("sound");
  document.getElementById("languageLabel").textContent = t("lang");
  document.getElementById("difficultyLabel").textContent = t("diff");
  document.getElementById("ammoLabel").textContent = t("ammo");
  document.getElementById("storeBody").textContent = t("soon");
  document.getElementById("lastScoreLabel").textContent = t("last");
  document.getElementById("totalShotsLabel").textContent = t("shots");
}

function saveGame() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    score:game.score, totalShots:game.totalShots, settings:game.settings,
    player:{x:player.x,y:player.y,angle:player.angle,pitch:player.pitch},
    weapon:{ammoInClip:weapon.ammoInClip,reserveAmmo:weapon.reserveAmmo},
    autoFire:game.autoFire
  }));
  refreshProfileStats();
}

function loadGame() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  try {
    const d = JSON.parse(raw);
    game.score = d.score || 0;
    game.totalShots = d.totalShots || 0;
    Object.assign(game.settings, d.settings || {});
    Object.assign(player, d.player || {});
    if (d.weapon) { weapon.ammoInClip = Math.max(0, Math.min(weapon.clipSize, d.weapon.ammoInClip ?? weapon.clipSize)); weapon.reserveAmmo = Math.max(0, d.weapon.reserveAmmo ?? 100); }
    game.autoFire = !!d.autoFire;
    syncSettingsControls(); refreshProfileStats(); updateAmmoHud(); applyLanguage();
    return true;
  } catch { return false; }
}

function syncSettingsControls() {
  document.getElementById("soundToggle").value = game.settings.sound;
  document.getElementById("languageSelect").value = game.settings.language;
  document.getElementById("difficultySelect").value = game.settings.difficulty;
}

function refreshProfileStats() { lastScoreEl.textContent = String(game.score); totalShotsEl.textContent = String(game.totalShots); }

function resetRun() {
  Object.assign(player, {x:TILE_SIZE*1.6, y:TILE_SIZE*1.6, angle:0, pitch:0, z:0, velocityZ:0, isGrounded:true, crouchLocked:false, eyeHeight:PLAYER_HEIGHT});
  game.score = 0; game.mapOpen = false; game.tracers = [];
  weapon.ammoInClip = weapon.clipSize; weapon.reserveAmmo = 100; weapon.reloading = false; weapon.reloadTimer = 0;
  updateAmmoHud(); refreshProfileStats(); saveGame();
}

function withFade(action) {
  fade.style.transition = "opacity .42s ease";
  fade.style.opacity = "1";
  setTimeout(() => {
    action();
    setTimeout(() => { fade.style.opacity = "0"; }, 80);
  }, 420);
}

function enterGame() {
  game.state = "playing";
  closeAllPopups();
  mainMenu.classList.remove("visible");
  pauseMenu.classList.remove("visible");
  hud.style.display = "block";
  updateMenuMusicState();
  updateWalkSound();
  canvas.requestPointerLock();
}

function openMainMenu() {
  game.state = "menu";
  mainMenu.classList.add("visible");
  pauseMenu.classList.remove("visible");
  hud.style.display = "none";
  game.mapOpen = false; bigMap.classList.remove("visible");
  updateMenuMusicState();
  updateWalkSound();
  if (document.pointerLockElement === canvas) document.exitPointerLock();
}

function togglePause() {
  if (game.state === "playing") {
    game.state = "paused";
    pauseMenu.classList.add("visible");
    if (document.pointerLockElement === canvas) document.exitPointerLock();
    saveGame();
  } else if (game.state === "paused") {
    pauseMenu.classList.remove("visible");
    enterGame();
  }
}

function closeAllPopups() {
  document.getElementById("settingsPopup").style.display = "none";
  document.getElementById("storePopup").style.display = "none";
  document.getElementById("scorePopup").style.display = "none";
}

function openPopup(id) {
  closeAllPopups();
  document.getElementById(id).style.display = "block";
}

function updateAmmoHud() {
  ammoText.textContent = `${weapon.ammoInClip} / ${weapon.reserveAmmo}`;
  ammoFill.style.width = `${(weapon.ammoInClip / weapon.clipSize) * 100}%`;
}

function startReload() {
  if (weapon.reloading || weapon.ammoInClip >= weapon.clipSize || weapon.reserveAmmo <= 0) return;
  weapon.reloading = true;
  audio.reload.currentTime = 0;
  tryPlay(audio.reload);
  weapon.reloadTimer = Math.max(0.1, audio.reload.duration || weapon.reloadTime);
}

function fireWeapon() {
  if (weapon.reloading || weapon.ammoInClip <= 0 || game.state !== "playing" || weapon.fireCooldown > 0) return;
  weapon.ammoInClip -= 1;
  weapon.recoil = 1;
  weapon.muzzleFlash = 0.08;
  weapon.fireCooldown = game.autoFire ? weapon.autoRate : weapon.semiRate;
  game.totalShots += 1; game.score += 10;
  game.tracers.push({ life:0.06, len: 80 + Math.random()*40, xJ:(Math.random()-0.5)*10, yJ:(Math.random()-0.5)*8 });
  if (game.tracers.length > 6) game.tracers.shift();
  playOneShotFrom(audio.shotTemplate);
  updateAmmoHud();
  if (weapon.ammoInClip === 0) startReload();
}

document.addEventListener("keydown", (e) => {
  const key = e.key.toLowerCase();
  if ([" ","arrowup","arrowdown","arrowleft","arrowright"].includes(key)) e.preventDefault();

  if (key === "escape") { if (game.state !== "menu") togglePause(); return; }
  if (key === "r") { startReload(); return; }
  if (key === "c" && game.state === "playing") player.crouchLocked = !player.crouchLocked;
  if (key === "m" && game.state === "playing") { game.mapOpen = !game.mapOpen; bigMap.classList.toggle("visible", game.mapOpen); }
  if (key === "capslock" && game.state === "playing") game.autoFire = !game.autoFire;
  if (key === " " && game.state === "playing" && player.isGrounded) { player.velocityZ = 300; player.isGrounded = false; }
  keys[key] = true;
  if (MOVE_KEYS.includes(key)) updateWalkSound();
});

document.addEventListener("keyup", (e) => {
  const key = e.key.toLowerCase();
  keys[key] = false;
  if (MOVE_KEYS.includes(key)) updateWalkSound();
});

canvas.addEventListener("click", () => { if (game.state === "playing") canvas.requestPointerLock(); });

document.addEventListener("mousemove", (e) => {
  if (document.pointerLockElement !== canvas || game.state !== "playing") return;
  player.angle += e.movementX * 0.0026;
  player.pitch = Math.max(-0.33, Math.min(0.33, player.pitch - e.movementY * 0.0018));
});

canvas.addEventListener("mousedown", (e) => { if (e.button === 0 && document.pointerLockElement === canvas && game.state === "playing") fireWeapon(); });

function mapAtCell(cx, cy) { if (cy < 0 || cy >= MAP.length || cx < 0 || cx >= MAP[0].length) return 1; return MAP[cy][cx]; }
function isWallAt(x, y) { const cx = Math.floor(x / TILE_SIZE); const cy = Math.floor(y / TILE_SIZE); return mapAtCell(cx, cy) === 1; }

function tryMove(nx, ny) {
  const r = PLAYER_RADIUS;
  const canX = !isWallAt(nx+r,player.y)&&!isWallAt(nx-r,player.y)&&!isWallAt(nx,player.y+r)&&!isWallAt(nx,player.y-r);
  const canY = !isWallAt(player.x+r,ny)&&!isWallAt(player.x-r,ny)&&!isWallAt(player.x,ny+r)&&!isWallAt(player.x,ny-r);
  if (canX) player.x = Math.max(r, Math.min(worldWidth-r, nx));
  if (canY) player.y = Math.max(r, Math.min(worldHeight-r, ny));
}

function updatePlayer(dt) {
  if (game.state !== "playing") return;
  game.time += dt;
  const moveSpeed = (keys["shift"] ? 370 : 250) * dt;

  let vx=0, vy=0;
  if (keys["w"]) { vx += Math.cos(player.angle)*moveSpeed; vy += Math.sin(player.angle)*moveSpeed; }
  if (keys["s"]) { vx -= Math.cos(player.angle)*moveSpeed; vy -= Math.sin(player.angle)*moveSpeed; }
  if (keys["a"]) { vx += Math.cos(player.angle-Math.PI/2)*moveSpeed; vy += Math.sin(player.angle-Math.PI/2)*moveSpeed; }
  if (keys["d"]) { vx += Math.cos(player.angle+Math.PI/2)*moveSpeed; vy += Math.sin(player.angle+Math.PI/2)*moveSpeed; }
  if (keys["arrowleft"]) player.angle -= 2.4*dt;
  if (keys["arrowright"]) player.angle += 2.4*dt;

  tryMove(player.x + vx, player.y + vy);
  const targetHeight = player.crouchLocked ? PLAYER_HEIGHT * 0.62 : PLAYER_HEIGHT;
  player.eyeHeight += (targetHeight - player.eyeHeight) * Math.min(1, dt * 13);

  player.velocityZ -= 780 * dt;
  player.z += player.velocityZ * dt;
  if (player.z <= 0) { player.z = 0; player.velocityZ = 0; player.isGrounded = true; }

  weapon.recoil = Math.max(0, weapon.recoil - dt * 7);
  weapon.muzzleFlash = Math.max(0, weapon.muzzleFlash - dt);
  weapon.fireCooldown = Math.max(0, weapon.fireCooldown - dt);

  if (game.autoFire && keys["mouse0"]) fireWeapon();
  if (!MOVE_KEYS.some(k => keys[k])) updateWalkSound();

  if (weapon.reloading) {
    weapon.reloadTimer -= dt;
    if (weapon.reloadTimer <= 0) {
      const need = weapon.clipSize - weapon.ammoInClip;
      const take = Math.min(need, weapon.reserveAmmo);
      weapon.ammoInClip += take;
      weapon.reserveAmmo -= take;
      weapon.reloading = false;
      tryPause(audio.reload);
      updateAmmoHud();
    }
  }

  game.tracers.forEach(t => t.life -= dt);
  game.tracers = game.tracers.filter(t => t.life > 0);
}

document.addEventListener("mousedown", e => { if (e.button===0) keys["mouse0"]=true; });
document.addEventListener("mouseup", e => { if (e.button===0) keys["mouse0"]=false; });

function castRay(rayAngle, maxDist = 4600) {
  const step = 4;
  let dist = 0, px = player.x, py = player.y;
  let prevCellX = Math.floor(px / TILE_SIZE), prevCellY = Math.floor(py / TILE_SIZE);
  while (dist < maxDist) {
    dist += step;
    px = player.x + Math.cos(rayAngle) * dist;
    py = player.y + Math.sin(rayAngle) * dist;
    const cx = Math.floor(px / TILE_SIZE), cy = Math.floor(py / TILE_SIZE);
    if (mapAtCell(cx, cy) === 1) return { dist, hitX:px, hitY:py, side:(cx!==prevCellX)?"vertical":"horizontal" };
    prevCellX = cx; prevCellY = cy;
  }
  return { dist:maxDist, hitX:px, hitY:py, side:"horizontal" };
}

function renderFloorAndSky() {
  const rawHorizon = canvas.height * (0.5 + player.pitch) - player.z * 0.5;
  const horizon = Math.max(0, Math.min(canvas.height, rawHorizon));

  const sky = ctx.createLinearGradient(0, 0, 0, Math.max(1, horizon));
  sky.addColorStop(0, "#3f2f38"); sky.addColorStop(.45, "#2a2331"); sky.addColorStop(1, "#1b1720");
  ctx.fillStyle = sky; ctx.fillRect(0, 0, canvas.width, horizon);

  if (!floorPixels || !floorTexW || !floorTexH) {
    if (floorPattern) {
      ctx.fillStyle = floorPattern;
      ctx.fillRect(0, horizon, canvas.width, canvas.height - horizon);
      const floorShade = ctx.createLinearGradient(0, horizon, 0, canvas.height);
      floorShade.addColorStop(0, "rgba(0,0,0,0.03)");
      floorShade.addColorStop(1, "rgba(0,0,0,0.35)");
      ctx.fillStyle = floorShade;
      ctx.fillRect(0, horizon, canvas.width, canvas.height - horizon);
    } else {
      ctx.fillStyle = "#594833";
      ctx.fillRect(0, horizon, canvas.width, canvas.height - horizon);
    }
    return;
  }

  const floorStart = Math.max(0, Math.floor(horizon));
  const floorHeight = Math.max(0, canvas.height - floorStart);
  if (!floorHeight) return;

  const floorImage = ctx.createImageData(canvas.width, floorHeight);
  const dst = floorImage.data;
  const fov = Math.PI / 3;
  const projDist = canvas.width / (2 * Math.tan(fov / 2));
  const dirX = Math.cos(player.angle), dirY = Math.sin(player.angle);
  const planeX = -dirY * Math.tan(fov / 2), planeY = dirX * Math.tan(fov / 2);
  const ray0X = dirX - planeX, ray0Y = dirY - planeY;
  const ray1X = dirX + planeX, ray1Y = dirY + planeY;
  const eye = player.eyeHeight + player.z;

  for (let y=0; y<floorHeight; y++) {
    const screenY = y + floorStart;
    const p = Math.max(1, screenY - horizon);
    const rowDistance = (eye * projDist) / p;
    const stepX = (rowDistance * (ray1X - ray0X)) / canvas.width;
    const stepY = (rowDistance * (ray1Y - ray0Y)) / canvas.width;
    let floorX = player.x + rowDistance * ray0X;
    let floorY = player.y + rowDistance * ray0Y;
    const shade = Math.max(0.2, 1 - rowDistance / 2500);

    for (let x=0; x<canvas.width; x++) {
      const tx = ((Math.floor(floorX) % TILE_SIZE + TILE_SIZE) % TILE_SIZE) / TILE_SIZE;
      const ty = ((Math.floor(floorY) % TILE_SIZE + TILE_SIZE) % TILE_SIZE) / TILE_SIZE;
      const sx = Math.floor(tx * floorTexW) % floorTexW;
      const sy = Math.floor(ty * floorTexH) % floorTexH;
      const src = (sy * floorTexW + sx) * 4;
      const di = (y * canvas.width + x) * 4;
      dst[di] = floorPixels[src] * shade;
      dst[di + 1] = floorPixels[src + 1] * shade;
      dst[di + 2] = floorPixels[src + 2] * shade;
      dst[di + 3] = 255;
      floorX += stepX; floorY += stepY;
    }
  }
  ctx.putImageData(floorImage, 0, floorStart);
}

function renderWalls() {
  const fov = Math.PI / 3;
  const projDist = canvas.width / (2 * Math.tan(fov / 2));
  const horizon = canvas.height * (0.5 + player.pitch) - player.z * 0.5;
  const eye = player.eyeHeight + player.z;

  for (let x=0; x<canvas.width; x++) {
    const t = x / canvas.width;
    const rayAngle = player.angle - fov/2 + t*fov;
    const hit = castRay(rayAngle);
    const correctedDist = hit.dist * Math.cos(rayAngle - player.angle);
    const wallScreenHeight = (WALL_HEIGHT / Math.max(1, correctedDist)) * projDist;
    const top = horizon - ((WALL_HEIGHT - eye) / Math.max(1, correctedDist)) * projDist;

    let texU = hit.side === "vertical" ? ((hit.hitY % TILE_SIZE)+TILE_SIZE)%TILE_SIZE : ((hit.hitX % TILE_SIZE)+TILE_SIZE)%TILE_SIZE;
    const texX = Math.floor((texU / TILE_SIZE) * (wallTexture.width || 1));

    if (wallTexture.complete && wallTexture.naturalWidth > 0) {
      ctx.drawImage(wallTexture, texX, 0, 1, wallTexture.height, x, top, 1, wallScreenHeight);
    } else {
      const shade = Math.max(45, 220 - correctedDist * 0.07);
      ctx.fillStyle = `rgb(${shade},${shade},${shade})`;
      ctx.fillRect(x, top, 1, wallScreenHeight);
    }

    const fog = Math.min(0.72, correctedDist / 2100);
    ctx.fillStyle = `rgba(0,0,0,${fog})`;
    ctx.fillRect(x, top, 1, wallScreenHeight);
  }
}

function renderCrosshair() {
  const cx = canvas.width/2, cy = canvas.height*(0.5 + player.pitch*0.5);
  ctx.fillStyle = "#fff";
  ctx.fillRect(cx-1, cy-9, 2, 18);
  ctx.fillRect(cx-9, cy-1, 18, 2);
}

function renderWeapon() {
  const gunW = Math.min(canvas.width * 0.43, 620);
  const gunH = gunW * 0.62;
  const breath = Math.sin(game.time * 2.6) * 4;
  const recoil = weapon.recoil * 28;
  const x = canvas.width - gunW * 0.9 + Math.sin(game.time * 1.8) * 2;
  const y = canvas.height - gunH * 0.78 + recoil + breath;
  const muzzleX = x + gunW * 0.84;
  const muzzleY = y + gunH * 0.22;

  if (gunTexture.complete && gunTexture.naturalWidth > 0) {
    ctx.drawImage(gunTexture, x, y, gunW, gunH);
  } else {
    ctx.fillStyle = "#36424f";
    ctx.fillRect(x, y, gunW, gunH);
  }

  if (weapon.muzzleFlash > 0) {
    const alpha = Math.min(0.8, weapon.muzzleFlash * 9);
    ctx.fillStyle = `rgba(255,210,120,${alpha})`;
    ctx.beginPath();
    ctx.ellipse(muzzleX, muzzleY, gunW * 0.1, gunH * 0.22, 0, 0, Math.PI*2);
    ctx.fill();
  }

  for (const tr of game.tracers) {
    const p = tr.life / 0.06;
    ctx.strokeStyle = `rgba(255,230,170,${0.35 + p * 0.45})`;
    ctx.lineWidth = 2 + p;
    ctx.beginPath();
    ctx.moveTo(muzzleX + tr.xJ, muzzleY + tr.yJ);
    ctx.lineTo(muzzleX + tr.xJ, muzzleY + tr.yJ - tr.len * p);
    ctx.stroke();
  }

  ctx.fillStyle = "rgba(255,255,255,.8)";
  ctx.font = `${Math.max(11, Math.floor(canvas.height * 0.015))}px monospace`;
  ctx.fillText(game.autoFire ? "FIRE MODE: AUTO" : "FIRE MODE: SEMI", x + 16, y + gunH + 18);
}

function getMinimapLayout() {
  let size = Math.min(canvas.width * 0.26, HUD_MINIMAP_MAX_SIZE, canvas.height * 0.42);
  const maxByHeight = canvas.height - (HUD_MINIMAP_MARGIN * 2) - HUD_MINIMAP_GAP - HUD_AMMO_ESTIMATED_HEIGHT;
  const safeMax = Math.max(48, maxByHeight);
  size = Math.min(size, safeMax);
  size = Math.max(Math.min(HUD_MINIMAP_MIN_SIZE, safeMax), size);
  return { x: HUD_MINIMAP_MARGIN, y: HUD_MINIMAP_MARGIN, size };
}

function syncHudLayout() {
  const layout = getMinimapLayout();
  hud.style.setProperty("--minimap-x", `${layout.x}px`);
  hud.style.setProperty("--minimap-y", `${layout.y}px`);
  hud.style.setProperty("--minimap-size", `${layout.size}px`);
  hud.style.setProperty("--minimap-gap", `${HUD_MINIMAP_GAP}px`);
}

function renderMinimap(toCtx = ctx, x, y, size) {
  const layout = (typeof x === "number" && typeof y === "number" && typeof size === "number")
    ? { x, y, size }
    : getMinimapLayout();
  const miniX = layout.x;
  const miniY = layout.y;
  const miniSize = layout.size;
  toCtx.fillStyle = "rgba(0,0,0,.45)";
  toCtx.fillRect(miniX - 8, miniY - 8, miniSize + 16, miniSize + 16);
  if (mapTexture.complete && mapTexture.naturalWidth > 0) toCtx.drawImage(mapTexture, miniX, miniY, miniSize, miniSize);
  else {
    const scale = miniSize / (MAP[0].length * TILE_SIZE);
    for (let yy=0; yy<MAP.length; yy++) for (let xx=0; xx<MAP[0].length; xx++) {
      toCtx.fillStyle = MAP[yy][xx] ? "#d3d3d3" : "#9f1f2b";
      toCtx.fillRect(miniX + xx*TILE_SIZE*scale, miniY + yy*TILE_SIZE*scale, TILE_SIZE*scale, TILE_SIZE*scale);
    }
  }
  const px = miniX + player.x * (miniSize / worldWidth), py = miniY + player.y * (miniSize / worldHeight);
  toCtx.fillStyle = "#2cff6e"; toCtx.beginPath(); toCtx.arc(px, py, 4, 0, Math.PI*2); toCtx.fill();
  toCtx.strokeStyle = "#2cff6e"; toCtx.lineWidth = 2;
  toCtx.beginPath(); toCtx.moveTo(px, py); toCtx.lineTo(px + Math.cos(player.angle)*14, py + Math.sin(player.angle)*14); toCtx.stroke();
  toCtx.lineWidth = 1;
}

function renderBigMap() {
  bigMapCtx.clearRect(0,0,bigMapCanvas.width,bigMapCanvas.height);
  renderMinimap(bigMapCtx, 24, 24, Math.min(bigMapCanvas.width, bigMapCanvas.height) - 48);
}

function renderPausedDim() {
  if (game.state !== "paused") return;
  ctx.fillStyle = "rgba(0,0,0,0.26)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

document.getElementById("newGameBtn").addEventListener("click", () => { activateSoundtrack(); withFade(() => { resetRun(); enterGame(); }); });
document.getElementById("continueBtn").addEventListener("click", () => { activateSoundtrack(); withFade(() => { loadGame(); enterGame(); }); });
document.getElementById("settingsBtn").addEventListener("click", () => openPopup("settingsPopup"));
document.getElementById("storeBtn").addEventListener("click", () => openPopup("storePopup"));
document.getElementById("scoreboardBtn").addEventListener("click", () => { refreshProfileStats(); openPopup("scorePopup"); });
document.querySelectorAll("[data-close]").forEach(btn => btn.addEventListener("click", closeAllPopups));
mainMenu.querySelectorAll("button").forEach(btn => btn.addEventListener("click", playButtonSound));

document.getElementById("resumeBtn").addEventListener("click", () => { activateSoundtrack(); togglePause(); });
document.getElementById("restartBtn").addEventListener("click", () => { activateSoundtrack(); resetRun(); pauseMenu.classList.remove("visible"); enterGame(); });
document.getElementById("toMenuBtn").addEventListener("click", () => { activateSoundtrack(); saveGame(); withFade(openMainMenu); });
document.getElementById("exitBtn").addEventListener("click", () => {
  saveGame();
  withFade(() => {
    try { window.close(); }
    catch { alert("A böngésző nem mindig engedi az automatikus kilépést."); }
    openMainMenu();
  });
});

document.getElementById("soundToggle").addEventListener("change", e => { game.settings.sound = e.target.value; saveGame(); });
document.getElementById("soundToggle").addEventListener("change", () => {
  updateMenuMusicState();
  updateWalkSound();
  if (!isSoundOn()) tryPause(audio.reload);
});
document.getElementById("languageSelect").addEventListener("change", e => { game.settings.language = e.target.value; applyLanguage(); saveGame(); });
document.getElementById("difficultySelect").addEventListener("change", e => { game.settings.difficulty = e.target.value; saveGame(); });

if (!loadGame()) { syncSettingsControls(); refreshProfileStats(); applyLanguage(); }
updateAmmoHud();
openMainMenu();
fade.style.transition = "opacity .6s ease";
fade.style.opacity = "1";
requestAnimationFrame(() => { requestAnimationFrame(() => { fade.style.opacity = "0"; }); });
updateMenuMusicState();

let last = performance.now();
function loop(now) {
  const dt = Math.min(0.033, (now - last) / 1000); last = now;
  updatePlayer(dt);
  renderFloorAndSky();
  renderWalls();
  renderWeapon();
  renderCrosshair();
  renderMinimap();
  renderPausedDim();
  if (game.mapOpen) renderBigMap();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

setInterval(() => { if (game.state === "playing") saveGame(); }, 3000);
</script>
