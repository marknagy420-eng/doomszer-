<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Doom stílusú 3D pálya</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .hint {
    position: fixed;
    top: 10px;
    left: 10px;
    color: #fff;
    font-family: monospace;
    font-size: 14px;
    background: rgba(0, 0, 0, 0.55);
    padding: 8px 10px;
    border: 1px solid rgba(255,255,255,0.25);
    z-index: 10;
    user-select: none;
  }
</style>
</head>
<body>
<div class="hint">Kattints a nézethez • WASD mozgás • Egér fordulás</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// --- Kért arányok ---
const TILE_SIZE = 128;          // 1 tile = 128 unit
const WALL_HEIGHT = 192;        // nagyobb tér érzet
const PLAYER_RADIUS = 20;       // collision 32-48 unit szélességhez igazítva
const PLAYER_HEIGHT = 64;       // referencia 56-72

const MAP = [
  "################################",
  "#...#......................#...#",
  "#...#.####################.#...#",
  "#...#.#..................#.#...#",
  "#####.#.################.#.#####",
  "#.....#.#..............#.#.....#",
  "#.#####.#.############.#.#####.#",
  "#.#.....#.#..........#.#.....#.#",
  "#.#.#####.#.########.#.#####.#.#",
  "#.#.#...#.#....##....#.#...#.#.#",
  "#...#...#.#.########.#.#...#...#",
  "#####...#.#..........#.#...#####",
  "#.......#.############.#.......#",
  "#.#######......##......#######.#",
  "#.#.....######.##.######.....#.#",
  "#.#.###......#....#......###.#.#",
  "#...#.#.####.######.####.#.#...#",
  "###.#.#.#..........#....#.#.###.",
  "#...#...#.##########.##...#...##",
  "#.#######.#........#.#.#######.#",
  "#.........#.######.#.#.........#",
  "#########.#.#....#.#.#########.#",
  "#.........#.#.##.#.#.........#.#",
  "################################"
].map(row => row.replace(/\./g, "0").replace(/#/g, "1").split("").map(Number));

const worldWidth = MAP[0].length * TILE_SIZE;
const worldHeight = MAP.length * TILE_SIZE;

const player = {
  x: TILE_SIZE * 2.5,
  y: TILE_SIZE * 2.5,
  angle: 0,
  eyeHeight: PLAYER_HEIGHT
};

const keys = Object.create(null);

document.addEventListener("keydown", (e) => {
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", (e) => {
  keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener("click", () => canvas.requestPointerLock());

document.addEventListener("mousemove", (e) => {
  if (document.pointerLockElement === canvas) {
    player.angle += e.movementX * 0.0026;
  }
});

function mapAtCell(cx, cy) {
  if (cy < 0 || cy >= MAP.length || cx < 0 || cx >= MAP[0].length) return 1;
  return MAP[cy][cx];
}

function isWallAt(x, y) {
  const cx = Math.floor(x / TILE_SIZE);
  const cy = Math.floor(y / TILE_SIZE);
  return mapAtCell(cx, cy) === 1;
}

function tryMove(nx, ny) {
  // Kör alapú ütközés 4 ponttal
  const r = PLAYER_RADIUS;
  const canX = !isWallAt(nx + r, player.y) && !isWallAt(nx - r, player.y) &&
               !isWallAt(nx, player.y + r) && !isWallAt(nx, player.y - r);
  const canY = !isWallAt(player.x + r, ny) && !isWallAt(player.x - r, ny) &&
               !isWallAt(player.x, ny + r) && !isWallAt(player.x, ny - r);

  if (canX) player.x = Math.max(r, Math.min(worldWidth - r, nx));
  if (canY) player.y = Math.max(r, Math.min(worldHeight - r, ny));
}

function updatePlayer(dt) {
  const turnSpeed = 2.5;
  const moveSpeed = (keys["shift"] ? 360 : 250) * dt;

  if (keys["arrowleft"]) player.angle -= turnSpeed * dt;
  if (keys["arrowright"]) player.angle += turnSpeed * dt;

  let vx = 0;
  let vy = 0;

  if (keys["w"]) {
    vx += Math.cos(player.angle) * moveSpeed;
    vy += Math.sin(player.angle) * moveSpeed;
  }
  if (keys["s"]) {
    vx -= Math.cos(player.angle) * moveSpeed;
    vy -= Math.sin(player.angle) * moveSpeed;
  }
  if (keys["a"]) {
    vx += Math.cos(player.angle - Math.PI / 2) * moveSpeed;
    vy += Math.sin(player.angle - Math.PI / 2) * moveSpeed;
  }
  if (keys["d"]) {
    vx += Math.cos(player.angle + Math.PI / 2) * moveSpeed;
    vy += Math.sin(player.angle + Math.PI / 2) * moveSpeed;
  }

  tryMove(player.x + vx, player.y + vy);
}

const floorTexture = new Image();
const wallTexture = new Image();
floorTexture.src = "talaj.png";
wallTexture.src = "fall.png";

let floorPattern = null;
floorTexture.onload = () => {
  floorPattern = ctx.createPattern(floorTexture, "repeat");
};

function castRay(rayAngle, maxDist = 4600) {
  const step = 4;
  let dist = 0;
  let px = player.x;
  let py = player.y;
  let prevCellX = Math.floor(px / TILE_SIZE);
  let prevCellY = Math.floor(py / TILE_SIZE);

  while (dist < maxDist) {
    dist += step;
    px = player.x + Math.cos(rayAngle) * dist;
    py = player.y + Math.sin(rayAngle) * dist;

    const cx = Math.floor(px / TILE_SIZE);
    const cy = Math.floor(py / TILE_SIZE);

    if (mapAtCell(cx, cy) === 1) {
      const side = (cx !== prevCellX) ? "vertical" : "horizontal";
      return { dist, hitX: px, hitY: py, side };
    }

    prevCellX = cx;
    prevCellY = cy;
  }

  return { dist: maxDist, hitX: px, hitY: py, side: "horizontal" };
}

function renderFloorAndSky() {
  // Ég
  const sky = ctx.createLinearGradient(0, 0, 0, canvas.height / 2);
  sky.addColorStop(0, "#1b2136");
  sky.addColorStop(1, "#2a334f");
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, canvas.width, canvas.height / 2);

  // Talaj: kért talaj.png textúra
  if (floorPattern) {
    ctx.save();
    ctx.translate((player.x * 0.12) % TILE_SIZE, (player.y * 0.12) % TILE_SIZE);
    ctx.fillStyle = floorPattern;
    ctx.fillRect(-TILE_SIZE, canvas.height / 2, canvas.width + TILE_SIZE * 2, canvas.height / 2 + TILE_SIZE);
    ctx.restore();
    ctx.fillStyle = "rgba(0,0,0,0.18)";
    ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);
  } else {
    ctx.fillStyle = "#3f4a3f";
    ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);
  }
}

function renderWalls() {
  const fov = Math.PI / 3;

  for (let x = 0; x < canvas.width; x++) {
    const t = x / canvas.width;
    const rayAngle = player.angle - fov / 2 + t * fov;
    const hit = castRay(rayAngle);

    const correctedDist = hit.dist * Math.cos(rayAngle - player.angle);
    const wallScreenHeight = (WALL_HEIGHT / Math.max(1, correctedDist)) * (canvas.height * 1.2);
    const top = (canvas.height - wallScreenHeight) / 2;

    let texU;
    if (hit.side === "vertical") {
      texU = ((hit.hitY % TILE_SIZE) + TILE_SIZE) % TILE_SIZE;
    } else {
      texU = ((hit.hitX % TILE_SIZE) + TILE_SIZE) % TILE_SIZE;
    }
    const texX = Math.floor((texU / TILE_SIZE) * (wallTexture.width || 1));

    if (wallTexture.complete && wallTexture.naturalWidth > 0) {
      ctx.drawImage(
        wallTexture,
        texX, 0, 1, wallTexture.height,
        x, top, 1, wallScreenHeight
      );
    } else {
      const shade = Math.max(45, 220 - correctedDist * 0.07);
      ctx.fillStyle = `rgb(${shade},${shade},${shade})`;
      ctx.fillRect(x, top, 1, wallScreenHeight);
    }

    // Távolsági árnyék
    const fog = Math.min(0.72, correctedDist / 2100);
    ctx.fillStyle = `rgba(0,0,0,${fog})`;
    ctx.fillRect(x, top, 1, wallScreenHeight);
  }
}

function renderCrosshair() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  ctx.fillStyle = "#fff";
  ctx.fillRect(cx - 1, cy - 9, 2, 18);
  ctx.fillRect(cx - 9, cy - 1, 18, 2);
}

function renderMinimap() {
  const scale = 0.1;
  const w = MAP[0].length * TILE_SIZE * scale;
  const h = MAP.length * TILE_SIZE * scale;
  const ox = canvas.width - w - 16;
  const oy = 16;

  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillRect(ox - 6, oy - 6, w + 12, h + 12);

  for (let y = 0; y < MAP.length; y++) {
    for (let x = 0; x < MAP[0].length; x++) {
      ctx.fillStyle = MAP[y][x] ? "#7c7c7c" : "#1f1f1f";
      ctx.fillRect(ox + x * TILE_SIZE * scale, oy + y * TILE_SIZE * scale, TILE_SIZE * scale, TILE_SIZE * scale);
    }
  }

  const px = ox + player.x * scale;
  const py = oy + player.y * scale;
  ctx.fillStyle = "#2cff6e";
  ctx.beginPath();
  ctx.arc(px, py, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "#2cff6e";
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(px + Math.cos(player.angle) * 14, py + Math.sin(player.angle) * 14);
  ctx.stroke();
}

let last = performance.now();
function loop(now) {
  const dt = Math.min(0.033, (now - last) / 1000);
  last = now;

  updatePlayer(dt);
  renderFloorAndSky();
  renderWalls();
  renderCrosshair();
  renderMinimap();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
