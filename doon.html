<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HELLBYTE</title>
<style>
  :root {
    color-scheme: dark;
    --ui-bg: rgba(8, 9, 14, 0.55);
    --ui-bg-strong: rgba(8, 9, 14, 0.78);
    --ui-border: rgba(255, 255, 255, 0.22);
    --accent: #f74a72;
    --accent-2: #36ffd0;
  }

  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; font-family: Inter, Segoe UI, Arial, sans-serif; }
  canvas { display: block; width: 100vw; height: 100vh; }

  #hud { position: fixed; inset: 0; pointer-events: none; z-index: 20; }

  .game-title {
    position: fixed;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: #f8f7ff;
    font-size: clamp(72px, 11vw, 168px);
    font-weight: 900;
    letter-spacing: 5px;
    text-shadow:
      0 2px 0 rgba(255,255,255,.22),
      0 6px 18px rgba(0,0,0,.7),
      0 0 38px rgba(0,0,0,.42);
    z-index: 21;
    animation: titlePulse 2.8s ease-in-out infinite;
    opacity: 1;
  }

  @keyframes titlePulse {
    0%, 100% {
      opacity: .82;
      filter: drop-shadow(0 0 0 rgba(0,0,0,0));
    }
    50% {
      opacity: 1;
      filter: drop-shadow(0 0 6px rgba(0,0,0,.42));
    }
  }

  .ammo-panel {
    position: fixed;
    left: 16px;
    top: calc(min(26vw, 340px) + 32px);
    width: min(340px, 26vw);
    padding: 0;
    border: none;
    background: transparent;
    box-shadow: none;
    z-index: 21;
    pointer-events: none;
  }

  .ammo-head { display: none; }
  #ammoText { font-weight: 700; color: #fff; font-size: 18px; }
  .ammo-load { height: 16px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.28); box-shadow: 0 2px 12px rgba(0,0,0,.4); }
  #ammoFill { height: 100%; width: 100%; background: linear-gradient(90deg, #48ff9f, #17c9ff); transition: width .15s linear; }

  .health-panel {
    position: fixed;
    left: 16px;
    top: calc(min(26vw, 340px) + 60px);
    width: min(340px, 26vw);
    z-index: 21;
    pointer-events: none;
  }
  #healthText { font-weight: 700; color: #fff; font-size: 15px; margin-bottom: 6px; display: block; }
  .health-load { height: 14px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.28); box-shadow: 0 2px 12px rgba(0,0,0,.4); }
  #healthFill { height: 100%; width: 100%; background: linear-gradient(90deg, #ff7a7a, #ff2c63); transition: width .12s linear; }

  .overlay { position: fixed; inset: 0; z-index: 30; display: none; align-items: center; justify-content: center; }
  .overlay.visible { display: flex; }

  #mainMenu {
    background: linear-gradient(rgba(5,5,8,.56), rgba(5,5,8,.8)), url("menuback.png") center/cover no-repeat;
    opacity: 1;
    transition: opacity 3s ease;
  }

  .menu-shell {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px;
    background: linear-gradient(180deg, rgba(8,8,12,0), rgba(8,8,12,.48));
    border-top: 1px solid rgba(255,255,255,.1);
    backdrop-filter: blur(4px);
  }

  .menu-btn {
    border: 1px solid rgba(255,255,255,.24);
    background: rgba(255,255,255,.1);
    color: #fff;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 15px;
    cursor: pointer;
    transition: .18s ease;
  }

  .menu-btn:hover, .menu-btn.active {
    border-color: var(--accent-2);
    box-shadow: 0 0 0 1px rgba(54,255,208,.34) inset;
    transform: translateY(-1px);
  }

  .popup {
    width: min(680px, 94vw);
    min-height: 220px;
    padding: 18px;
    border-radius: 14px;
    border: 1px solid var(--ui-border);
    background: var(--ui-bg);
    backdrop-filter: blur(8px);
    box-shadow: 0 24px 60px rgba(0,0,0,.55);
    color: #f0f4ff;
  }

  .popup h2 { margin: 0 0 12px; }
  .popup-head { display: flex; justify-content: space-between; align-items: center; }

  .field { margin-bottom: 14px; display: grid; gap: 8px; }
  label { font-weight: 600; color: #dce3ee; }
  select {
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,.22);
    background: rgba(255,255,255,.1);
    color: #fff;
    padding: 9px 11px;
    font-size: 14px;
  }

  .stat { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.09); }

  #pauseMenu .popup { width: min(440px, 88vw); min-height: auto; }

  #fade {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    z-index: 60;
    transition: opacity .34s ease;
  }

  #bigMap {
    position: fixed;
    inset: 0;
    z-index: 40;
    overflow: hidden;
    background: rgba(0,0,0,.78);
    display: none;
  }

  #bigMap.visible { display: block; }
  #bigMap canvas { width: 100%; height: 100%; display: block; }

  body.intro-seq #menuTitle {
    opacity: 0;
    transition: opacity 2s ease;
  }
  body.intro-seq.intro-title-visible #menuTitle { opacity: 1; }

  body.intro-seq #mainMenu {
    opacity: 0;
    transition: opacity 3s ease 2s;
  }
  body.intro-seq.intro-bg-visible #mainMenu { opacity: 1; }
</style>
</head>

function isSoundOn() { return game.settings.sound !== "off"; }
function tryPlay(aud, fromStart = false) {
  if (!isSoundOn()) return;
  try {
    if (!aud.paused && !aud.ended) return;
    if (fromStart) aud.currentTime = 0;
    const p = aud.play();
    if (p && typeof p.catch === "function") p.catch(() => {});
  } catch {}
}
function tryPause(aud) {
  try { aud.pause(); } catch {}
}
function playOneShotFrom(template) {
  if (!isSoundOn()) return;
  try {
    const fx = template.cloneNode();
    fx.volume = template.volume;
    fx.play().catch(() => {});
  } catch {}
}
function updateMenuMusicState() {
  if (game.state === "menu" && isSoundOn()) tryPlay(audio.menuMusic);
  else tryPause(audio.menuMusic);
}

function updateWalkSound() {
  const walking = game.state === "playing" && MOVE_KEYS.some(k => keys[k]);
  if (!walking || !isSoundOn()) {
    tryPause(audio.walkLoop);
    return;
  }
  tryPlay(audio.walkLoop);
}
function playButtonSound() { playOneShotFrom(audio.buttonTemplate); }

let floorPixels = null, floorTexW = 0, floorTexH = 0, floorPattern = null;

  floorTexW = floorTexture.naturalWidth || floorTexture.width;
  floorTexH = floorTexture.naturalHeight || floorTexture.height;
  try {
    const tmp = document.createElement("canvas");
    tmp.width = floorTexW; tmp.height = floorTexH;
    const tctx = tmp.getContext("2d");
    tctx.drawImage(floorTexture, 0, 0);
    floorPixels = tctx.getImageData(0, 0, floorTexW, floorTexH).data;
  } catch {
    floorPixels = null;
  }
  try { floorPattern = ctx.createPattern(floorTexture, "repeat"); }
  catch { floorPattern = null; }
};

async function initDemonRenderer() {
  const sourceCanvas = document.createElement("canvas");
  sourceCanvas.width = 256;
  sourceCanvas.height = 256;
  demonRenderState.sourceCanvas = sourceCanvas;

  const threeMod = await import("https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js");
  const fbxMod = await import("https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/loaders/FBXLoader.js");

  const THREE = threeMod;
  const renderer = new THREE.WebGLRenderer({
    canvas: sourceCanvas,
    alpha: true,
    antialias: true,
    preserveDrawingBuffer: true
  });
  renderer.setPixelRatio(1);
  renderer.setSize(sourceCanvas.width, sourceCanvas.height, false);
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(33, 1, 0.1, 100);
  camera.position.set(0, 1.05, 2.7);

  const ambient = new THREE.AmbientLight(0xffffff, 1.18);
  scene.add(ambient);
  const key = new THREE.DirectionalLight(0xffd3d3, 1.12);
  key.position.set(2.8, 4, 3);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0x66b8ff, 0.72);
  rim.position.set(-3.5, 1.4, -2.8);
  scene.add(rim);

  let mixer = null;
  let demon = null;

  const loader = new fbxMod.FBXLoader();
  loader.load(
    "Cute_Demon.fbx",
    (obj) => {
      demon = obj;
      demon.traverse((child) => {
        if (child.isMesh && child.material) {
          child.castShadow = false;
          child.receiveShadow = false;
          child.frustumCulled = false;
        }
      });
      const box = new THREE.Box3().setFromObject(demon);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x || 1, size.y || 1, size.z || 1);
      const scale = 1.35 / maxDim;
      demon.scale.setScalar(scale);

      const scaledBox = new THREE.Box3().setFromObject(demon);
      const center = scaledBox.getCenter(new THREE.Vector3());
      const min = scaledBox.min.clone();
      demon.position.sub(center);
      demon.position.y -= min.y;

      scene.add(demon);

      if (Array.isArray(demon.animations) && demon.animations.length) {
        mixer = new THREE.AnimationMixer(demon);
        const clip = demon.animations[0];
        const action = mixer.clipAction(clip);
        action.play();
      }

      demonRenderState.ready = true;
      demonRenderState.failed = false;
    },
    undefined,
    () => {
      demonRenderState.failed = true;
    }
  );

  demonRenderState.update = (dt) => {
    if (!demonRenderState.ready || !demon) return;
    if (mixer) mixer.update(Math.min(0.05, Math.max(0, dt)));
    demon.rotation.y += dt * 0.85;
    renderer.render(scene, camera);
  };
}

function updateDemonRenderer(dt) {
  if (typeof demonRenderState.update === "function") demonRenderState.update(dt);
}

function drawEnemyWithDemonSprite(left, top, spriteW, spriteH) {

function saveGame() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    score:game.score, totalShots:game.totalShots, settings:game.settings,
    player:{x:player.x,y:player.y,angle:player.angle,pitch:player.pitch},
    weapon:{ammoInClip:weapon.ammoInClip,reserveAmmo:weapon.reserveAmmo},
    autoFire:game.autoFire,
    playerHp:game.playerHp,
    enemies:game.enemies

  refreshProfileStats();
}

function loadGame() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  try {
    const d = JSON.parse(raw);
    game.score = d.score || 0;
    game.totalShots = d.totalShots || 0;
    Object.assign(game.settings, d.settings || {});
    Object.assign(player, d.player || {});
    if (d.weapon) { weapon.ammoInClip = Math.max(0, Math.min(weapon.clipSize, d.weapon.ammoInClip ?? weapon.clipSize)); weapon.reserveAmmo = Math.max(0, d.weapon.reserveAmmo ?? 100); }
    game.autoFire = !!d.autoFire;
    game.playerHp = Math.max(0, Math.min(MAX_PLAYER_HP, d.playerHp ?? MAX_PLAYER_HP));
    game.enemies = Array.isArray(d.enemies) ? d.enemies.filter(e => !e.dead).map(e => ({
      id: e.id || Math.floor(Math.random() * 1e6),
      x: e.x, y: e.y, hp: Math.max(0, e.hp ?? 100), shootCd: e.shootCd || 0, dead: false
    })) : [];
    if (!game.enemies.length) spawnEnemies();
    syncSettingsControls(); refreshProfileStats(); updateAmmoHud(); applyLanguage();
    updateHealthHud();
    return true;
  } catch { return false; }
}

function syncSettingsControls() {
  document.getElementById("soundToggle").value = game.settings.sound;
  document.getElementById("languageSelect").value = game.settings.language;
  document.getElementById("difficultySelect").value = game.settings.difficulty;
}

function refreshProfileStats() { lastScoreEl.textContent = String(game.score); totalShotsEl.textContent = String(game.totalShots); }

function resetRun() {
  Object.assign(player, {x:TILE_SIZE*1.6, y:TILE_SIZE*1.6, angle:0, pitch:0, z:0, velocityZ:0, isGrounded:true, crouchLocked:false, eyeHeight:PLAYER_HEIGHT, velX:0, velY:0});
  game.score = 0; game.mapOpen = false; game.tracers = []; game.enemyTracers = [];
  game.playerHp = MAX_PLAYER_HP;
  spawnEnemies();
  weapon.ammoInClip = weapon.clipSize; weapon.reserveAmmo = 100; weapon.reloading = false; weapon.reloadTimer = 0; weapon.reloadAnim = 0;
  updateAmmoHud(); updateHealthHud(); refreshProfileStats(); saveGame();
}

function withFade(action) {
  fade.style.transition = "opacity .42s ease";
  fade.style.opacity = "1";
  setTimeout(() => {
    action();
    setTimeout(() => { fade.style.opacity = "0"; }, 80);
  }, 420);
}

function enterGame() {
  if (!game.enemies.length) spawnEnemies();
  if (game.playerHp <= 0) game.playerHp = MAX_PLAYER_HP;
  updateHealthHud();
  game.state = "playing";
  closeAllPopups();
  mainMenu.classList.remove("visible");
  pauseMenu.classList.remove("visible");

  canvas.requestPointerLock();
}

function openMainMenu() {
  game.state = "menu";
  mainMenu.classList.add("visible");
  pauseMenu.classList.remove("visible");
  hud.style.display = "none";
  game.mapOpen = false; bigMap.classList.remove("visible");
  updateMenuMusicState();
  updateWalkSound();

}

function togglePause() {
  if (game.state === "playing") {
    game.state = "paused";
    pauseMenu.classList.add("visible");
    if (document.pointerLockElement === canvas) document.exitPointerLock();
    saveGame();
  } else if (game.state === "paused") {
    pauseMenu.classList.remove("visible");
    enterGame();
  }
}

function closeAllPopups() {
  document.getElementById("settingsPopup").style.display = "none";
  document.getElementById("storePopup").style.display = "none";
  document.getElementById("scorePopup").style.display = "none";
}

  document.getElementById(id).style.display = "block";
}

function updateAmmoHud() {
  ammoText.textContent = `${weapon.ammoInClip} / ${weapon.reserveAmmo}`;
  ammoFill.style.width = `${(weapon.ammoInClip / weapon.clipSize) * 100}%`;
}

function updateHealthHud() {
  const hp = Math.max(0, Math.round(game.playerHp));
  healthText.textContent = `${t("hp")}: ${hp}`;
  healthFill.style.width = `${(hp / MAX_PLAYER_HP) * 100}%`;
}

function spawnEnemies() {
  const candidates = [];
  for (let y = 1; y < MAP.length - 1; y++) {
    for (let x = 1; x < MAP[0].length - 1; x++) {
      if (MAP[y][x] !== 0) continue;
      const worldX = x * TILE_SIZE + TILE_SIZE * 0.5;
      const worldY = y * TILE_SIZE + TILE_SIZE * 0.5;
      if (Math.hypot(worldX - player.x, worldY - player.y) < TILE_SIZE * 3) continue;
      candidates.push({ x: worldX, y: worldY });
    }
  }
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  game.enemies = candidates.slice(0, 10).map((p, idx) => ({
    id: idx + 1,
    x: p.x,
    y: p.y,
    hp: 100,
    shootCd: Math.random() * ENEMY_FIRE_COOLDOWN,
    dead: false
  }));
}

function hasLineOfSight(fromX, fromY, toX, toY) {
  const dx = toX - fromX;
  const dy = toY - fromY;
  const dist = Math.hypot(dx, dy);
  if (dist < 1) return true;
  const stepLen = 8;
  const steps = Math.ceil(dist / stepLen);
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    if (isWallAt(fromX + dx * t, fromY + dy * t)) return false;
  }
  return true;
}

function startReload() {
  if (weapon.reloading || weapon.ammoInClip >= weapon.clipSize || weapon.reserveAmmo <= 0) return;
  weapon.reloading = true;
  weapon.reloadAnim = 0;
  audio.reload.currentTime = 0;
  tryPlay(audio.reload);
  weapon.reloadTimer = Math.max(0.1, audio.reload.duration || weapon.reloadTime);
}

function fireWeapon() {
  if (weapon.reloading || weapon.ammoInClip <= 0 || game.state !== "playing" || weapon.fireCooldown > 0) return;
  weapon.ammoInClip -= 1;
  weapon.recoil = 1;
  weapon.muzzleFlash = 0.08;
  weapon.fireCooldown = game.autoFire ? weapon.autoRate : weapon.semiRate;
  game.totalShots += 1;
  game.tracers.push({
    age: 0,
    duration: 0.16,
    len: 120 + Math.random() * 90,
    xJ: (Math.random() - 0.5) * 10,
    yJ: (Math.random() - 0.5) * 8,
    arc: (Math.random() - 0.5) * 28
  });
  if (game.tracers.length > 6) game.tracers.shift();
  playOneShotFrom(audio.shotTemplate);
  let bestEnemy = null;
  let bestT = Infinity;
  const rayX = Math.cos(player.angle);
  const rayY = Math.sin(player.angle);
  for (const enemy of game.enemies) {
    if (enemy.dead) continue;
    const dx = enemy.x - player.x;
    const dy = enemy.y - player.y;
    const proj = dx * rayX + dy * rayY;
    if (proj < 0 || proj > TILE_SIZE * 8) continue;
    const perp = Math.abs(dx * rayY - dy * rayX);
    if (perp > ENEMY_RADIUS * 1.3) continue;
    if (!hasLineOfSight(player.x, player.y, enemy.x, enemy.y)) continue;
    if (proj < bestT) { bestT = proj; bestEnemy = enemy; }
  }
  if (bestEnemy) {
    bestEnemy.hp -= 40;
    game.score += 20;
    if (bestEnemy.hp <= 0) {
      bestEnemy.dead = true;
      game.score += 120;
    }
  }
  game.enemies = game.enemies.filter(e => !e.dead);
  updateAmmoHud();
  if (weapon.ammoInClip === 0) startReload();
}

document.addEventListener("keydown", (e) => {
  const key = e.key.toLowerCase();
  if ([" ","arrowup","arrowdown","arrowleft","arrowright"].includes(key)) e.preventDefault();

  if (key === "escape") { if (game.state !== "menu") togglePause(); return; }
  if (key === "r") { startReload(); return; }
  if (key === "c" && game.state === "playing") player.crouchLocked = !player.crouchLocked;
  if (key === "m" && game.state === "playing") { game.mapOpen = !game.mapOpen; bigMap.classList.toggle("visible", game.mapOpen); }
  if (key === "capslock" && game.state === "playing") game.autoFire = !game.autoFire;
  if (key === " " && game.state === "playing" && player.isGrounded) { player.velocityZ = 300; player.isGrounded = false; }
  keys[key] = true;
  if (MOVE_KEYS.includes(key)) updateWalkSound();
});

document.addEventListener("keyup", (e) => {
  const key = e.key.toLowerCase();
  keys[key] = false;
  if (MOVE_KEYS.includes(key)) updateWalkSound();
});

canvas.addEventListener("click", () => { if (game.state === "playing") canvas.requestPointerLock(); });

document.addEventListener("mousemove", (e) => {
  if (document.pointerLockElement !== canvas || game.state !== "playing") return;
  player.angle += e.movementX * 0.0026;
  player.pitch = Math.max(-0.33, Math.min(0.33, player.pitch - e.movementY * 0.0018));
});

canvas.addEventListener("mousedown", (e) => { if (e.button === 0 && document.pointerLockElement === canvas && game.state === "playing") fireWeapon(); });

function mapAtCell(cx, cy) { if (cy < 0 || cy >= MAP.length || cx < 0 || cx >= MAP[0].length) return 1; return MAP[cy][cx]; }
function isWallAt(x, y) { const cx = Math.floor(x / TILE_SIZE); const cy = Math.floor(y / TILE_SIZE); return mapAtCell(cx, cy) === 1; }

function floorPatternSample(worldX, worldY, rowDistance) {
  const cellX = Math.floor(worldX / TILE_SIZE);
  const cellY = Math.floor(worldY / TILE_SIZE);
  const localX = ((worldX % TILE_SIZE) + TILE_SIZE) % TILE_SIZE;
  const localY = ((worldY % TILE_SIZE) + TILE_SIZE) % TILE_SIZE;
  const tileU = localX / TILE_SIZE;
  const tileV = localY / TILE_SIZE;

  const nearLeft = localX;
  const nearRight = TILE_SIZE - localX;
  const nearTop = localY;
  const nearBottom = TILE_SIZE - localY;

  let nearestWallDist = Infinity;
  if (mapAtCell(cellX - 1, cellY) === 1) nearestWallDist = Math.min(nearestWallDist, nearLeft);
  if (mapAtCell(cellX + 1, cellY) === 1) nearestWallDist = Math.min(nearestWallDist, nearRight);
  if (mapAtCell(cellX, cellY - 1) === 1) nearestWallDist = Math.min(nearestWallDist, nearTop);
  if (mapAtCell(cellX, cellY + 1) === 1) nearestWallDist = Math.min(nearestWallDist, nearBottom);

  let wallBlend = 0;
  if (nearestWallDist !== Infinity) {
    wallBlend = 1 - Math.min(1, nearestWallDist / FLOOR_WALL_BLEND_RANGE);
    wallBlend = wallBlend * wallBlend;
  }

  const checker = ((cellX + cellY) & 1) ? 0.92 : 1.08;
  const groutLine = Math.max(
    Math.exp(-Math.min(tileU, 1 - tileU) * 26),
    Math.exp(-Math.min(tileV, 1 - tileV) * 26)
  );
  const groutDarken = Math.min(0.2, groutLine * 0.14);

  const bandsX = Math.sin((worldX * FLOOR_PATTERN_SCALE) + cellY * 0.58);
  const bandsY = Math.cos((worldY * FLOOR_PATTERN_SCALE * 1.07) - cellX * 0.63);
  const pattern = (0.9 + (bandsX * bandsY) * 0.13) * checker;
  const distanceFade = Math.max(0.35, 1 - rowDistance / 3200);
  const tintBase = Math.max(0.42, (pattern - groutDarken) * distanceFade);

  return {
    darken: Math.min(0.72, wallBlend * 0.55 + groutDarken),
    tintR: (1 + wallBlend * 0.08) * tintBase,
    tintG: (1 - wallBlend * 0.06) * tintBase,
    tintB: (1 - wallBlend * 0.14) * tintBase
  };
}

function tryMove(nx, ny) {
  const r = PLAYER_RADIUS;
  const canX = !isWallAt(nx+r,player.y)&&!isWallAt(nx-r,player.y)&&!isWallAt(nx,player.y+r)&&!isWallAt(nx,player.y-r);
  const canY = !isWallAt(player.x+r,ny)&&!isWallAt(player.x-r,ny)&&!isWallAt(player.x,ny+r)&&!isWallAt(player.x,ny-r);
  if (canX) player.x = Math.max(r, Math.min(worldWidth-r, nx));
  if (canY) player.y = Math.max(r, Math.min(worldHeight-r, ny));
}

function updatePlayer(dt) {
  if (game.state !== "playing") return;
  game.time += dt;
  const moveSpeed = keys["shift"] ? 370 : 250;
  const acceleration = 14;
  const deceleration = 11;

  let inputX = 0, inputY = 0;
  if (keys["w"]) inputY += 1;
  if (keys["s"]) inputY -= 1;
  if (keys["a"]) inputX -= 1;
  if (keys["d"]) inputX += 1;

  const inputLen = Math.hypot(inputX, inputY) || 1;
  inputX /= inputLen;
  inputY /= inputLen;

  const targetVelX = (Math.cos(player.angle) * inputY + Math.cos(player.angle + Math.PI / 2) * inputX) * moveSpeed;
  const targetVelY = (Math.sin(player.angle) * inputY + Math.sin(player.angle + Math.PI / 2) * inputX) * moveSpeed;
  const blend = Math.min(1, (Math.abs(inputX) > 0.001 || Math.abs(inputY) > 0.001 ? acceleration : deceleration) * dt);
  player.velX = (player.velX || 0) + (targetVelX - (player.velX || 0)) * blend;
  player.velY = (player.velY || 0) + (targetVelY - (player.velY || 0)) * blend;

  if (keys["arrowleft"]) player.angle -= 2.4*dt;
  if (keys["arrowright"]) player.angle += 2.4*dt;

  tryMove(player.x + player.velX * dt, player.y + player.velY * dt);
  const targetHeight = player.crouchLocked ? PLAYER_HEIGHT * 0.62 : PLAYER_HEIGHT;
  player.eyeHeight += (targetHeight - player.eyeHeight) * Math.min(1, dt * 13);

  player.velocityZ -= 780 * dt;
  player.z += player.velocityZ * dt;
  if (player.z <= 0) { player.z = 0; player.velocityZ = 0; player.isGrounded = true; }

  weapon.recoil = Math.max(0, weapon.recoil - dt * 7);
  weapon.muzzleFlash = Math.max(0, weapon.muzzleFlash - dt * 1.9);
  weapon.fireCooldown = Math.max(0, weapon.fireCooldown - dt);

  if (game.autoFire && keys["mouse0"]) fireWeapon();
  if (!MOVE_KEYS.some(k => keys[k])) updateWalkSound();

  if (weapon.reloading) {
    weapon.reloadTimer -= dt;
    const totalReloadTime = Math.max(0.1, weapon.reloadTime || audio.reload.duration || 1.15);
    weapon.reloadAnim = Math.max(0, Math.min(1, 1 - (weapon.reloadTimer / totalReloadTime)));
    if (weapon.reloadTimer <= 0) {
      const need = weapon.clipSize - weapon.ammoInClip;
      const take = Math.min(need, weapon.reserveAmmo);
      weapon.ammoInClip += take;
      weapon.reserveAmmo -= take;
      weapon.reloading = false;
      weapon.reloadAnim = 0;
      tryPause(audio.reload);
      updateAmmoHud();
    }
  } else {
    weapon.reloadAnim = 0;
  }

  game.tracers.forEach(t => t.age += dt);
  game.tracers = game.tracers.filter(t => t.age < t.duration);
  game.enemyTracers.forEach(t => t.age += dt);
  game.enemyTracers = game.enemyTracers.filter(t => t.age < t.duration);
  updateEnemies(dt);
}

function canEnemyMoveTo(nx, ny) {
  const r = ENEMY_RADIUS;
  return !isWallAt(nx + r, ny) && !isWallAt(nx - r, ny) && !isWallAt(nx, ny + r) && !isWallAt(nx, ny - r);
}

function updateEnemies(dt) {
  if (game.state !== "playing") return;
  for (const enemy of game.enemies) {
    const dx = player.x - enemy.x;
    const dy = player.y - enemy.y;
    const dist = Math.hypot(dx, dy) || 1;
    const dirX = dx / dist;
    const dirY = dy / dist;
    const canSeePlayer = hasLineOfSight(enemy.x, enemy.y, player.x, player.y);

    if (dist > TILE_SIZE * 1.8 || !canSeePlayer) {
      const nx = enemy.x + dirX * ENEMY_SPEED * dt;
      const ny = enemy.y + dirY * ENEMY_SPEED * dt;
      if (canEnemyMoveTo(nx, enemy.y)) enemy.x = nx;
      if (canEnemyMoveTo(enemy.x, ny)) enemy.y = ny;
    } else {
      const sideX = -dirY;
      const sideY = dirX;
      const strafeDir = Math.sin(game.time * 1.7 + enemy.id) > 0 ? 1 : -1;
      const nx = enemy.x + sideX * ENEMY_SPEED * dt * 0.75 * strafeDir;
      const ny = enemy.y + sideY * ENEMY_SPEED * dt * 0.75 * strafeDir;
      if (canEnemyMoveTo(nx, enemy.y)) enemy.x = nx;
      if (canEnemyMoveTo(enemy.x, ny)) enemy.y = ny;
    }

    enemy.shootCd -= dt;
    if (canSeePlayer && dist < ENEMY_ATTACK_RANGE && enemy.shootCd <= 0) {
      enemy.shootCd = ENEMY_FIRE_COOLDOWN + Math.random() * 0.7;
      const hitChance = Math.max(0.2, 0.84 - dist / (TILE_SIZE * 9));
      if (Math.random() < hitChance) {
        game.playerHp = Math.max(0, game.playerHp - (8 + Math.random() * 8));
        updateHealthHud();
      }
      game.enemyTracers.push({
        age: 0,
        duration: 0.16,
        fromX: enemy.x,
        fromY: enemy.y,
        toX: player.x + (Math.random() - 0.5) * 20,
        toY: player.y + (Math.random() - 0.5) * 20
      });
      if (game.enemyTracers.length > 30) game.enemyTracers.shift();
    }
  }

  if (game.playerHp <= 0) {
    alert(t("died"));
    resetRun();
  }
}

document.addEventListener("mousedown", e => { if (e.button===0) keys["mouse0"]=true; });
document.addEventListener("mouseup", e => { if (e.button===0) keys["mouse0"]=false; });

function castRay(rayAngle, maxDist = 4600) {
  const step = 4;
  let dist = 0, px = player.x, py = player.y;
  let prevCellX = Math.floor(px / TILE_SIZE), prevCellY = Math.floor(py / TILE_SIZE);
  while (dist < maxDist) {
    dist += step;
    px = player.x + Math.cos(rayAngle) * dist;
    py = player.y + Math.sin(rayAngle) * dist;
    const cx = Math.floor(px / TILE_SIZE), cy = Math.floor(py / TILE_SIZE);
    if (mapAtCell(cx, cy) === 1) return { dist, hitX:px, hitY:py, side:(cx!==prevCellX)?"vertical":"horizontal" };
    prevCellX = cx; prevCellY = cy;
  }
  return { dist:maxDist, hitX:px, hitY:py, side:"horizontal" };
}

function getCameraParams() {
  const fov = CAMERA_FOV;
  const projDist = canvas.width / (2 * Math.tan(fov / 2));
  const eye = Math.max(12, player.eyeHeight + player.z);
  const rawHorizon = canvas.height * 0.5 + player.pitch * canvas.height + CAMERA_HORIZON_OFFSET - player.z * 0.35;
  const horizon = Math.max(0, Math.min(canvas.height - 1, rawHorizon));
  return { fov, projDist, eye, horizon };
}

function renderFloorAndSky() {
  const { fov, projDist, eye, horizon } = getCameraParams();

  const sky = ctx.createLinearGradient(0, 0, 0, Math.max(1, horizon));
  sky.addColorStop(0, "#3f2f38"); sky.addColorStop(.45, "#2a2331"); sky.addColorStop(1, "#1b1720");
  ctx.fillStyle = sky; ctx.fillRect(0, 0, canvas.width, horizon);

  if (!floorPixels || !floorTexW || !floorTexH) {
    if (floorPattern) {
      ctx.fillStyle = floorPattern;
      ctx.fillRect(0, horizon, canvas.width, canvas.height - horizon);
      const floorShade = ctx.createLinearGradient(0, horizon, 0, canvas.height);
      floorShade.addColorStop(0, "rgba(0,0,0,0.03)");
      floorShade.addColorStop(1, "rgba(0,0,0,0.35)");
      ctx.fillStyle = floorShade;
      ctx.fillRect(0, horizon, canvas.width, canvas.height - horizon);
    } else {
      ctx.fillStyle = "#594833";
      ctx.fillRect(0, horizon, canvas.width, canvas.height - horizon);
    }
    return;
  }

  const floorStart = Math.max(0, Math.floor(horizon));
  const floorHeight = Math.max(0, canvas.height - floorStart);
  if (!floorHeight) return;

  const floorImage = ctx.createImageData(canvas.width, floorHeight);
  const dst = floorImage.data;
  const dirX = Math.cos(player.angle), dirY = Math.sin(player.angle);
  const planeX = -dirY * Math.tan(fov / 2), planeY = dirX * Math.tan(fov / 2);
  const ray0X = dirX - planeX, ray0Y = dirY - planeY;
  const ray1X = dirX + planeX, ray1Y = dirY + planeY;

  for (let y=0; y<floorHeight; y++) {
    const screenY = y + floorStart;
    const p = Math.max(1.4, screenY - horizon);
    const rowDistance = Math.max(TILE_SIZE * 0.22, (eye * projDist) / p);
    const stepX = (rowDistance * (ray1X - ray0X)) / canvas.width;
    const stepY = (rowDistance * (ray1Y - ray0Y)) / canvas.width;
    let floorX = player.x + rowDistance * ray0X;
    let floorY = player.y + rowDistance * ray0Y;
    const shade = Math.max(0.2, 1 - rowDistance / 2500);

    for (let x=0; x<canvas.width; x++) {
      const tx = ((floorX / TILE_SIZE) * FLOOR_UV_REPEAT) % 1;
      const ty = ((floorY / TILE_SIZE) * FLOOR_UV_REPEAT) % 1;
      const sx = Math.floor(Math.abs(tx) * floorTexW) % floorTexW;
      const sy = Math.floor(Math.abs(ty) * floorTexH) % floorTexH;
      const src = (sy * floorTexW + sx) * 4;
      const di = (y * canvas.width + x) * 4;
      const floorFx = floorPatternSample(floorX, floorY, rowDistance);
      const baseShade = Math.max(0.12, shade * (1 - floorFx.darken));
      dst[di] = Math.min(255, floorPixels[src] * baseShade * floorFx.tintR);
      dst[di + 1] = Math.min(255, floorPixels[src + 1] * baseShade * floorFx.tintG);
      dst[di + 2] = Math.min(255, floorPixels[src + 2] * baseShade * floorFx.tintB);
      dst[di + 3] = 255;
      floorX += stepX; floorY += stepY;
    }
  }
  ctx.putImageData(floorImage, 0, floorStart);
}

function renderWalls() {
  const { fov, projDist, horizon, eye } = getCameraParams();
  if (wallDepthBuffer.length !== canvas.width) wallDepthBuffer = new Float32Array(canvas.width);

  for (let x=0; x<canvas.width; x++) {
    const t = x / canvas.width;
    const rayAngle = player.angle - fov/2 + t*fov;
    const hit = castRay(rayAngle);
    const correctedDist = hit.dist * Math.cos(rayAngle - player.angle);
    wallDepthBuffer[x] = correctedDist;
    const wallScreenHeight = (WALL_HEIGHT / Math.max(1, correctedDist)) * projDist;
    const wallBottom = horizon + (eye / Math.max(1, correctedDist)) * projDist;
    const top = wallBottom - wallScreenHeight;

    let texU = hit.side === "vertical" ? ((hit.hitY % TILE_SIZE)+TILE_SIZE)%TILE_SIZE : ((hit.hitX % TILE_SIZE)+TILE_SIZE)%TILE_SIZE;
    const texX = Math.floor((texU / TILE_SIZE) * (wallTexture.width || 1));

    if (wallTexture.complete && wallTexture.naturalWidth > 0) {
      ctx.drawImage(wallTexture, texX, 0, 1, wallTexture.height, x, top, 1, wallScreenHeight);
    } else {
      const shade = Math.max(45, 220 - correctedDist * 0.07);
      ctx.fillStyle = `rgb(${shade},${shade},${shade})`;
      ctx.fillRect(x, top, 1, wallScreenHeight);
    }

    const fog = Math.min(0.72, correctedDist / 2100);
    ctx.fillStyle = `rgba(0,0,0,${fog})`;
    ctx.fillRect(x, top, 1, wallScreenHeight);
  }
}

function renderEnemies() {
  const { fov, projDist, horizon, eye } = getCameraParams();
  const sorted = [...game.enemies].sort((a, b) => {
    const da = (a.x - player.x) ** 2 + (a.y - player.y) ** 2;
    const db = (b.x - player.x) ** 2 + (b.y - player.y) ** 2;
    return db - da;
  });

  for (const enemy of sorted) {
    const dx = enemy.x - player.x;
    const dy = enemy.y - player.y;
    const dist = Math.hypot(dx, dy);
    const angleToEnemy = Math.atan2(dy, dx) - player.angle;
    const rel = Math.atan2(Math.sin(angleToEnemy), Math.cos(angleToEnemy));
    if (Math.abs(rel) > fov * 0.7 || dist < 8) continue;
    const corrected = dist * Math.cos(rel);
    const screenX = (0.5 + rel / fov) * canvas.width;
    const spriteH = (WALL_HEIGHT / Math.max(1, corrected)) * projDist * ENEMY_VISUAL_HEIGHT;
    const spriteW = spriteH * ENEMY_VISUAL_WIDTH;
    const baseY = horizon + (eye / Math.max(1, corrected)) * projDist;
    const top = baseY - spriteH;
    const left = screenX - spriteW / 2;
    const right = screenX + spriteW / 2;

    let visible = false;
    for (let sx = Math.max(0, Math.floor(left)); sx <= Math.min(canvas.width - 1, Math.ceil(right)); sx++) {
      if (corrected <= wallDepthBuffer[sx]) { visible = true; break; }
    }
    if (!visible) continue;

    const drewDemon = drawEnemyWithDemonSprite(left, top, spriteW, spriteH);
    if (!drewDemon) {
      for (let sx = Math.max(0, Math.floor(left)); sx <= Math.min(canvas.width - 1, Math.ceil(right)); sx++) {
        if (corrected > wallDepthBuffer[sx]) continue;
        const nx = (sx - left) / Math.max(1, spriteW);
        if (nx < 0 || nx > 1) continue;
        const centerBias = 1 - Math.abs(nx - 0.5) * 1.35;
        const shade = Math.max(0.15, 1 - corrected / 1500);
        ctx.fillStyle = `rgba(${Math.floor(200 * shade)},${Math.floor(40 + 80 * centerBias * shade)},${Math.floor(50 + 90 * centerBias * shade)},0.95)`;
        ctx.fillRect(sx, top, 1, spriteH);
      }
    }

    const hpRatio = Math.max(0, enemy.hp / 100);
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(left, top - 12, spriteW, 5);
    ctx.fillStyle = `rgba(${Math.floor(255 * (1 - hpRatio))},${Math.floor(220 * hpRatio)},80,0.95)`;
    ctx.fillRect(left, top - 12, spriteW * hpRatio, 5);
  }
}

function renderEnemyTracers() {
  const { fov, projDist, horizon, eye } = getCameraParams();
  for (const tr of game.enemyTracers) {
    const p1 = projectWorldPoint(tr.fromX, tr.fromY, eye, fov, projDist, horizon);
    const p2 = projectWorldPoint(tr.toX, tr.toY, eye, fov, projDist, horizon);
    if (!p1 || !p2) continue;
    const a = 1 - tr.age / tr.duration;
    ctx.strokeStyle = `rgba(255,70,70,${a * 0.8})`;
    ctx.lineWidth = 1 + a * 2;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  }
}

function projectWorldPoint(worldX, worldY, eye, fov, projDist, horizon) {
  const dx = worldX - player.x;
  const dy = worldY - player.y;
  const dist = Math.hypot(dx, dy);
  if (dist < 2) return null;
  const rel = Math.atan2(Math.sin(Math.atan2(dy, dx) - player.angle), Math.cos(Math.atan2(dy, dx) - player.angle));
  if (Math.abs(rel) > fov * 0.8) return null;
  const corrected = dist * Math.cos(rel);
  const x = (0.5 + rel / fov) * canvas.width;
  const y = horizon + (eye / Math.max(1, corrected)) * projDist - 40;
  return { x, y };
}

function renderCrosshair() {
  const cx = canvas.width/2, cy = canvas.height*(0.5 + player.pitch*0.5);
  ctx.fillStyle = "#fff";
  ctx.fillRect(cx-1, cy-9, 2, 18);
  ctx.fillRect(cx-9, cy-1, 18, 2);
}

function renderWeapon() {
  const gunW = Math.min(canvas.width * 0.43, 620);
  const gunH = gunW * 0.62;
  const moveEnergy = Math.min(1, Math.hypot(player.velX || 0, player.velY || 0) / 300);
  const breath = Math.sin(game.time * (2.2 + moveEnergy * 1.6)) * (3 + moveEnergy * 3.5);
  const recoil = weapon.recoil * 28;
  const reloadEase = Math.sin(weapon.reloadAnim * Math.PI);
  const reloadDrop = reloadEase * gunH * 0.18;
  const reloadSide = Math.sin(weapon.reloadAnim * Math.PI * 2) * gunW * 0.035;
  const reloadTilt = Math.sin(weapon.reloadAnim * Math.PI) * 0.14;
  const x = canvas.width - gunW * 0.9 + Math.sin(game.time * 1.8) * 2 + reloadSide;
  const y = canvas.height - gunH * 0.78 + recoil + breath + reloadDrop;
  const cx = x + gunW * 0.58;
  const cy = y + gunH * 0.62;
  const muzzleX = x + gunW * 0.84;
  const muzzleY = y + gunH * 0.22;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(reloadTilt);
  ctx.translate(-cx, -cy);
  if (gunTexture.complete && gunTexture.naturalWidth > 0) {
    ctx.drawImage(gunTexture, x, y, gunW, gunH);
  } else {
    ctx.fillStyle = "#36424f";
    ctx.fillRect(x, y, gunW, gunH);
  }
  ctx.restore();

  if (weapon.muzzleFlash > 0) {
    const alpha = Math.min(0.48, weapon.muzzleFlash * 6);
    ctx.fillStyle = `rgba(255,210,120,${alpha})`;
    ctx.beginPath();
    ctx.ellipse(muzzleX, muzzleY, gunW * 0.065, gunH * 0.14, 0, 0, Math.PI*2);
    ctx.fill();
  }

  for (const tr of game.tracers) {
    const t = Math.max(0, Math.min(1, tr.age / tr.duration));
    const eased = 1 - Math.pow(1 - t, 3);
    const alpha = (1 - t) * 0.75;
    const tipY = muzzleY + tr.yJ - tr.len * eased;
    const midY = muzzleY + tr.yJ - tr.len * 0.5 + tr.arc;
    ctx.strokeStyle = `rgba(255,225,140,${alpha})`;
    ctx.lineWidth = 1.6 + (1 - t) * 1.8;
    ctx.beginPath();
    ctx.moveTo(muzzleX + tr.xJ, muzzleY + tr.yJ);
    ctx.quadraticCurveTo(muzzleX + tr.xJ + tr.arc * 0.08, midY, muzzleX + tr.xJ, tipY);
    ctx.stroke();

    ctx.fillStyle = `rgba(255,210,90,${0.24 + alpha * 0.55})`;
    ctx.beginPath();
    ctx.arc(muzzleX + tr.xJ, tipY, 2.2 + (1 - t) * 2.6, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = "rgba(255,255,255,.8)";
  ctx.font = `${Math.max(11, Math.floor(canvas.height * 0.015))}px monospace`;
  ctx.fillText(game.autoFire ? "FIRE MODE: AUTO" : "FIRE MODE: SEMI", x + 16, y + gunH + 18);
}

function worldToMinimapUV(worldX, worldY) {
  let u = worldX / worldWidth;
  let v = worldY / worldHeight;

  if (MINIMAP_FLIP_Y) v = 1 - v;

  const cx = u - 0.5;
  const cy = v - 0.5;
  const c = Math.cos(MINIMAP_ROTATION_OFFSET);
  const s = Math.sin(MINIMAP_ROTATION_OFFSET);

  return {
    u: cx * c - cy * s + 0.5,
    v: cx * s + cy * c + 0.5
  };
}

function worldToMinimapPoint(worldX, worldY, x, y, width, height) {
  const uv = worldToMinimapUV(worldX, worldY);
  return { x: x + uv.u * width, y: y + uv.v * height };
}

function renderMinimap(toCtx = ctx, x=16, y=16, width=Math.min(canvas.width*0.26, 340), height=width, drawBackdrop=true) {
  if (drawBackdrop) {
    toCtx.fillStyle = "rgba(0,0,0,.45)";
    toCtx.fillRect(x - 8, y - 8, width + 16, height + 16);
  }

  if (mapTexture.complete && mapTexture.naturalWidth > 0) toCtx.drawImage(mapTexture, x, y, width, height);
  else {
    const scaleX = width / worldWidth;
    const scaleY = height / worldHeight;
    for (let yy=0; yy<MAP.length; yy++) for (let xx=0; xx<MAP[0].length; xx++) {
      toCtx.fillStyle = MAP[yy][xx] ? "#d3d3d3" : "#9f1f2b";
      toCtx.fillRect(x + xx*TILE_SIZE*scaleX, y + yy*TILE_SIZE*scaleY, TILE_SIZE*scaleX, TILE_SIZE*scaleY);
    }
  }

  const p = worldToMinimapPoint(player.x, player.y, x, y, width, height);
  toCtx.fillStyle = "#2cff6e";
  toCtx.beginPath();
  toCtx.arc(p.x, p.y, 4, 0, Math.PI*2);
  toCtx.fill();

  const lookAhead = TILE_SIZE * 0.9;
  const f = worldToMinimapPoint(
    player.x + Math.cos(player.angle) * lookAhead,
    player.y + Math.sin(player.angle) * lookAhead,
    x, y, width, height
  );

  toCtx.strokeStyle = "#2cff6e";
  toCtx.lineWidth = 2;
  toCtx.beginPath();
  toCtx.moveTo(p.x, p.y);
  toCtx.lineTo(f.x, f.y);
  toCtx.stroke();
  toCtx.lineWidth = 1;

  toCtx.fillStyle = "#ff4a4a";
  for (const enemy of game.enemies) {
    const ep = worldToMinimapPoint(enemy.x, enemy.y, x, y, width, height);
    toCtx.beginPath();
    toCtx.arc(ep.x, ep.y, 3.2, 0, Math.PI * 2);
    toCtx.fill();
  }
}

function renderBigMap() {
  bigMapCtx.clearRect(0,0,bigMapCanvas.width,bigMapCanvas.height);
  renderMinimap(bigMapCtx, 0, 0, bigMapCanvas.width, bigMapCanvas.height, false);
}

function renderPausedDim() {
  if (game.state !== "paused") return;
  ctx.fillStyle = "rgba(0,0,0,0.26)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

document.getElementById("newGameBtn").addEventListener("click", () => { withFade(() => { resetRun(); enterGame(); }); });
document.getElementById("continueBtn").addEventListener("click", () => { withFade(() => { loadGame(); enterGame(); }); });
document.getElementById("settingsBtn").addEventListener("click", () => openPopup("settingsPopup"));
document.getElementById("storeBtn").addEventListener("click", () => openPopup("storePopup"));
document.getElementById("scoreboardBtn").addEventListener("click", () => { refreshProfileStats(); openPopup("scorePopup"); });
document.querySelectorAll("[data-close]").forEach(btn => btn.addEventListener("click", closeAllPopups));
mainMenu.querySelectorAll("button").forEach(btn => btn.addEventListener("click", playButtonSound));

document.getElementById("resumeBtn").addEventListener("click", () => { togglePause(); });
document.getElementById("restartBtn").addEventListener("click", () => { resetRun(); pauseMenu.classList.remove("visible"); enterGame(); });
document.getElementById("toMenuBtn").addEventListener("click", () => { saveGame(); withFade(openMainMenu); });
document.getElementById("exitBtn").addEventListener("click", () => {
  saveGame();
  withFade(() => {
    try { window.close(); }
    catch { alert("A böngésző nem mindig engedi az automatikus kilépést."); }
    openMainMenu();
  });
});

document.getElementById("soundToggle").addEventListener("change", e => { game.settings.sound = e.target.value; saveGame(); });
document.getElementById("soundToggle").addEventListener("change", () => {
  updateMenuMusicState();
  updateWalkSound();
  if (!isSoundOn()) tryPause(audio.reload);
});
document.getElementById("languageSelect").addEventListener("change", e => { game.settings.language = e.target.value; applyLanguage(); saveGame(); });
document.getElementById("difficultySelect").addEventListener("change", e => { game.settings.difficulty = e.target.value; saveGame(); });

if (!loadGame()) { syncSettingsControls(); refreshProfileStats(); applyLanguage(); }
updateAmmoHud();
updateHealthHud();
openMainMenu();
fade.style.transition = "opacity 5s ease";
fade.style.opacity = "1";
requestAnimationFrame(() => { requestAnimationFrame(() => { fade.style.opacity = "0"; }); });
document.body.classList.add("intro-seq");
setTimeout(() => document.body.classList.add("intro-title-visible"), 40);
setTimeout(() => document.body.classList.add("intro-bg-visible"), 2000);
setTimeout(() => document.body.classList.remove("intro-seq", "intro-title-visible", "intro-bg-visible"), 5000);
updateMenuMusicState();
document.addEventListener("pointerdown", updateMenuMusicState, { passive:true });
document.addEventListener("keydown", updateMenuMusicState);

let last = performance.now();
function loop(now) {
  const dt = Math.min(0.033, (now - last) / 1000); last = now;
  updatePlayer(dt);
  updateDemonRenderer(dt);
  renderFloorAndSky();
  renderWalls();
  renderEnemies();
  renderEnemyTracers();
  renderWeapon();
  renderCrosshair();
  renderMinimap();
  renderPausedDim();
  if (game.mapOpen) renderBigMap();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

setInterval(() => { if (game.state === "playing") saveGame(); }, 3000);
</script>
